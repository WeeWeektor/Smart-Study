<!DOCTYPE html>
<html>
<head>
    <style>
        .button {
            background-color: #4F46E5;
            color: white !important;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
<h2>{{ title }}</h2>
<p style="white-space: pre-wrap;">{{ message }}</p>

{% if personal_link %}
    <div style="margin-top: 20px;">
        <a href="{{ personal_link }}" class="button">
            {{ link_text|default:"View" }}
        </a>
    </div>
{% endif %}

<div class="footer">
    <hr>
    <p>Kind regards, the team <strong>Smart-Study</strong></p>
</div>
</body>
</html>
